[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = false

[runner]
fastReruns = true

[theme]
primaryColor = "#7C5CFF"
backgroundColor = "#0B0D12"
secondaryBackgroundColor = "#111522"
textColor = "#FFFFFF"
font = "sans serif"

